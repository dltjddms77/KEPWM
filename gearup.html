<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a1628">
<title>KODABIZ 기업정보 조회</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a1628;--surface:#0f1f38;--surface2:#162a4a;--border:#1e3a5f;--accent:#0ea5e9;--accent2:#38bdf8;--accent-glow:rgba(14,165,233,0.15);--green:#10b981;--amber:#f59e0b;--red:#ef4444;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--white:#fff;--teal:#14b8a6}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0}
.bg-grid{position:fixed;top:0;left:0;width:100%;height:100%;background-image:linear-gradient(rgba(14,165,233,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(14,165,233,.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}
/* LOGIN */
.login-screen{position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
.login-screen.hidden{display:none}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 28px;width:100%;max-width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.login-logo{width:120px;margin:0 auto 20px;border-radius:12px;overflow:hidden}
.login-logo img{width:100%;height:auto;display:block}
.login-title{font-size:18px;font-weight:900;color:var(--white);margin-bottom:4px}
.login-sub{font-size:12px;color:var(--text3);margin-bottom:24px}
.login-input{width:100%;padding:14px 16px;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;color:var(--white);font-size:16px;font-family:inherit;outline:none;text-align:center;letter-spacing:4px;transition:border-color .25s;margin-bottom:16px}
.login-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.login-input::placeholder{letter-spacing:0;font-size:14px;color:var(--text3)}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#0284c7);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s}
.login-btn:active{transform:scale(.97)}
.login-error{color:var(--red);font-size:13px;margin-top:12px;display:none}
.login-error.show{display:block;animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
/* APP */
.app{display:none}.app.show{display:block}
.container{max-width:960px;margin:0 auto;padding:16px;position:relative;z-index:1}
.header{text-align:center;padding:24px 12px 16px;position:relative}
.header::before{content:'';position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:240px;height:240px;background:radial-gradient(circle,rgba(14,165,233,.12),transparent 70%);pointer-events:none}
.header-logo{height:40px;margin-bottom:12px}
h1{font-size:clamp(16px,4.5vw,28px);font-weight:900;background:linear-gradient(135deg,#fff,#7dd3fc 50%,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.5px;line-height:1.3}
.subtitle{color:var(--text2);font-size:12px;margin-top:4px;font-weight:300}
.stats-row{display:flex;justify-content:center;gap:20px;margin-top:14px}
.stat-item{text-align:center}.stat-num{font-size:20px;font-weight:900;color:var(--accent2)}.stat-label{font-size:10px;color:var(--text3)}
/* TABS */
.tab-bar{display:flex;gap:0;margin:0 0 4px;background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex:0 0 auto;padding:11px 14px;border:none;background:transparent;color:var(--text3);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.tab-btn.active{background:var(--accent);color:#fff;border-radius:10px}
.tab-btn:active{opacity:.8}
.tab-btn svg{width:14px;height:14px}
.tab-content{display:none}.tab-content.active{display:block}
/* SEARCH */
.search-section{position:sticky;top:0;z-index:200;padding:8px 0 12px;background:rgba(10,22,40,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.search-wrap{position:relative}
.search-box{position:relative;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;transition:all .25s}
.search-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow),0 4px 20px rgba(0,0,0,.3)}
.search-box input{width:100%;padding:14px 48px 14px 44px;background:transparent;border:none;color:var(--white);font-size:16px;font-family:inherit;outline:none}
.search-box input::placeholder{color:var(--text3);font-size:14px}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.search-icon svg{width:18px;height:18px}
.clr-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--surface2);border:none;color:var(--text3);width:30px;height:30px;border-radius:8px;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:16px}
.clr-btn.show{display:flex}
.ac-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:199}.ac-overlay.show{display:block}
.autocomplete{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.6);display:none;z-index:201;-webkit-overflow-scrolling:touch;max-height:min(360px,50vh)}
.autocomplete.show{display:block}
.ac-item{padding:13px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.04);min-height:52px}
.ac-item:active,.ac-item.active{background:var(--accent-glow)}
.ac-item:last-child{border-bottom:none}
.ac-name{font-weight:500;font-size:14px}.ac-meta{font-size:11px;color:var(--text3);margin-top:1px}
.ac-badge{margin-left:auto;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;flex-shrink:0;background:rgba(14,165,233,.15);color:var(--accent2)}
.ac-count{padding:10px 16px;font-size:12px;color:var(--text3);border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
/* RESULT */
.result{display:none;animation:fadeUp .4s ease}.result.show{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.company-hero{background:linear-gradient(135deg,var(--surface),var(--surface2));border:1px solid var(--border);border-radius:16px;padding:20px;margin:16px 0 12px;position:relative;overflow:hidden}
.company-hero::before{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;background:radial-gradient(circle,rgba(14,165,233,.1),transparent 70%);pointer-events:none}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:relative;z-index:1}
.company-name{font-size:clamp(20px,5vw,28px);font-weight:900;color:var(--white);line-height:1.25;word-break:keep-all}
.fav-btn{width:40px;height:40px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.fav-btn:active{transform:scale(.9)}
.fav-btn svg{width:20px;height:20px;color:var(--text3);transition:all .2s}
.fav-btn.on svg{color:#f59e0b;fill:#f59e0b}
.badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.badge{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.badge-year{background:rgba(14,165,233,.15);color:var(--accent2);border:1px solid rgba(14,165,233,.25)}
.badge-inn{background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.25)}
.badge-ven{background:rgba(236,72,153,.12);color:#ec4899;border:1px solid rgba(236,72,153,.25)}
.badge-wom{background:rgba(244,114,182,.12);color:#f472b6;border:1px solid rgba(244,114,182,.25)}
.badge-dis{background:rgba(168,85,247,.12);color:#a855f7;border:1px solid rgba(168,85,247,.25)}
.badge-soc{background:rgba(20,184,166,.12);color:var(--teal);border:1px solid rgba(20,184,166,.25)}
.badge-gpass{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.25)}
.badge-cat{background:rgba(99,102,241,.12);color:#818cf8;border:1px solid rgba(99,102,241,.25)}
.quick-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
.pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.04);border-radius:10px;padding:10px 12px;min-width:0}
.pill svg{width:14px;height:14px;color:var(--text3);flex-shrink:0}
.pill-content{min-width:0;overflow:hidden}.pill-label{font-size:10px;color:var(--text3)}.pill-value{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.section-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:10px}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.section-header{padding:14px 16px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;-webkit-user-select:none}
.section-header:active{background:rgba(255,255,255,.02)}
.section-header svg.si{width:16px;height:16px;color:var(--accent);flex-shrink:0}
.stxt{font-size:13px;font-weight:700;color:var(--text2);flex:1}
.sarr{width:20px;height:20px;color:var(--text3);transition:transform .3s;flex-shrink:0}
.sarr.open{transform:rotate(180deg)}
.sbody{max-height:0;overflow:hidden;transition:max-height .35s ease}.sbody.open{max-height:800px}
.sbody-in{padding:0 16px 14px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);gap:12px}
.info-row:last-child{border-bottom:none}
.info-key{font-size:12px;color:var(--text3);flex-shrink:0;min-width:70px}
.info-val{font-size:13px;color:var(--text);text-align:right;word-break:break-all;min-width:0}
.info-val a{color:var(--accent2);text-decoration:none}
/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state svg{width:48px;height:48px;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:14px}
/* FILTER TAB */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filter-select{padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;outline:none;flex:1;min-width:100px;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%2364748b' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;background-size:12px;padding-right:32px}
.filter-select:focus{border-color:var(--accent)}
.export-btn{padding:10px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--green);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap}
.export-btn:active{transform:scale(.97)}
.export-btn svg{width:14px;height:14px}
.filter-results{font-size:12px;color:var(--text3);margin-bottom:8px}
.ftable-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:14px;background:var(--surface);max-height:55vh;overflow-y:auto}
.ftable{width:100%;border-collapse:collapse;font-size:12px;min-width:700px}
.ftable th{background:var(--surface2);color:var(--text2);padding:11px 10px;text-align:left;font-weight:600;font-size:11px;position:sticky;top:0;z-index:1;white-space:nowrap;border-bottom:1px solid var(--border)}
.ftable td{padding:10px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text);white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis}
.ftable tr:hover td{background:rgba(14,165,233,.04)}
.ftable .clickable{cursor:pointer;color:var(--accent2);font-weight:500}
/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:1fr;gap:12px}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px}
.dash-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.dash-title svg{width:16px;height:16px;color:var(--accent)}
.hbar-wrap{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto}
.hbar-row{display:flex;align-items:center;gap:8px;font-size:12px}
.hbar-label{width:80px;text-align:right;color:var(--text2);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hbar-track{flex:1;height:22px;background:var(--surface2);border-radius:6px;overflow:hidden;position:relative}
.hbar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent),#818cf8);transition:width .6s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;min-width:fit-content}
.hbar-num{font-size:10px;font-weight:700;color:var(--white);white-space:nowrap}
/* FAVORITES */
.fav-list{display:flex;flex-direction:column;gap:8px}
.fav-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .2s}
.fav-card:active{border-color:var(--accent)}
.fav-info{flex:1;min-width:0}
.fav-name{font-size:14px;font-weight:700;color:var(--white)}
.fav-meta{font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fav-rm{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);flex-shrink:0}
.fav-rm:active{background:rgba(239,68,68,.1);color:var(--red)}
/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(15,31,56,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;z-index:300;padding-bottom:env(safe-area-inset-bottom)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 4px 8px;border:none;background:transparent;color:var(--text3);font-size:10px;font-family:inherit;cursor:pointer}
.bnav-btn.active{color:var(--accent2)}
.bnav-btn svg{width:20px;height:20px}
/* BACK TO TOP */
.back-top{position:fixed;bottom:80px;right:16px;width:44px;height:44px;border-radius:12px;background:var(--accent);color:#fff;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:250;box-shadow:0 4px 16px rgba(14,165,233,.4)}
.back-top.show{display:flex}
.back-top:active{transform:scale(.9)}
.back-top svg{width:20px;height:20px}
/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--surface2);color:var(--text);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;border:1px solid var(--border);white-space:nowrap}
.toast.show{opacity:1}
/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
body{padding-bottom:70px}
@media(min-width:600px){.quick-info{grid-template-columns:1fr 1fr 1fr}.dash-grid{grid-template-columns:1fr 1fr}}
</style>
</head>

  h+='<div class="section-card"><div class="section-header" onclick="toggleSection(this)"><svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg><span class="stxt">지원성과</span><svg class="sarr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div>';
  h+='<div class="sbody"><div class="sbody-in">';
  h+='<div class="info-row"><span class="info-key">2021</span><span class="info-val">'+esc(d.e21||'-')+'</span></div>';
  h+='<div class="info-row"><span class="info-key">2022</span><span class="info-val">'+esc(d.e22||'-')+'</span></div>';
  h+='<div class="info-row"><span class="info-key">2023</span><span class="info-val">'+esc(d.e23||'-')+'</span></div>';
  h+='<div class="info-row"><span class="info-key">2024</span><span class="info-val">'+esc(d.e24||'-')+'</span></div>';
  h+='<div class="info-row"><span class="info-key">2025</span><span class="info-val">'+esc(d.e25||'-')+'</span></div>';
  h+='<div class="info-row"><span class="info-key">2026</span><span class="info-val">'+esc(d.e26||'-')+'</span></div>';
  h+='</div></div></div>';

  h+='</div>';
  r.innerHTML=h;
  r.classList.add('show');
  setTimeout(function(){r.scrollIntoView({behavior:'smooth',block:'start'});},100);
}

// FILTER
function buildFilterOptions(){var rs={},ys={};for(var i=0;i<DB.length;i++){if(DB[i].loc)rs[DB[i].loc]=1;var yrs=DB[i].year.split(',');for(var j=0;j<yrs.length;j++){var y=yrs[j].trim();if(y)ys[y]=1;}}
var rSel=document.getElementById('fRegion');rSel.innerHTML='<option value="">전체 지역</option>';Object.keys(rs).sort().forEach(function(k){rSel.innerHTML+='<option value="'+esc(k)+'">'+esc(k)+'</option>';});
var ySel=document.getElementById('fYear');ySel.innerHTML='<option value="">전체 연도</option>';Object.keys(ys).sort().forEach(function(k){ySel.innerHTML+='<option value="'+esc(k)+'">'+esc(k)+'</option>';});}

function renderFilter(){var rg=document.getElementById('fRegion').value,yr=document.getElementById('fYear').value;
filteredList=DB.filter(function(d){return(!rg||d.loc===rg)&&(!yr||d.year.indexOf(yr)!==-1);});
document.getElementById('fResults').textContent=filteredList.length+'개 기업 (전체 '+DB.length+'개)';
var h='';for(var i=0;i<filteredList.length;i++){var d=filteredList[i];h+='<tr><td class="clickable" onclick="showCompanyByName(\''+esc(d.n).replace(/'/g,"\\'")+'\')">' +esc(d.n)+'</td><td>'+esc(d.ceo)+'</td><td>'+esc(d.prod)+'</td><td>'+esc(d.loc)+'</td><td>'+esc(d.year)+'</td><td>'+esc(d.off)+'</td><td>'+esc(d.mgr)+'</td></tr>';}
document.getElementById('fBody').innerHTML=h;}

window.exportCSV=function(){var list=filteredList.length?filteredList:DB;
var csv='\uFEFF기업명,대표자,품목군,대표품목,소재지,선정년도,사무실,팩스,담당자,휴대폰,이메일,홈페이지,본사주소,진출국가,기술인증\n';
for(var i=0;i<list.length;i++){var d=list[i];csv+='"'+[d.n,d.ceo,d.cat,d.prod,d.loc,d.year,d.off,d.fax,d.mgr,d.ph,d.em,d.hp,d.adr,d.cn,d.tech].map(function(v){return String(v||'').replace(/"/g,'""');}).join('","')+'"\n';}
var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='KODABIZ_기업DB.csv';a.click();showToast('CSV 파일이 다운로드됩니다');};

// DASHBOARD
function renderDash(){var locCounts={},yrCounts={};
for(var i=0;i<DB.length;i++){var d=DB[i];if(d.loc){locCounts[d.loc]=(locCounts[d.loc]||0)+1;}
var yrs=d.year.split(',');for(var j=0;j<yrs.length;j++){var y=yrs[j].trim();if(y)yrCounts[y]=(yrCounts[y]||0)+1;}}
var locArr=Object.entries(locCounts).sort(function(a,b){return b[1]-a[1];});
var maxLoc=locArr.length?locArr[0][1]:1;
var h='<div class="dash-card"><div class="dash-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>지역별 기업 분포</div><div class="hbar-wrap">';
for(var k=0;k<locArr.length;k++){var pct=Math.round(locArr[k][1]/maxLoc*100);h+='<div class="hbar-row"><span class="hbar-label">'+esc(locArr[k][0])+'</span><div class="hbar-track"><div class="hbar-fill" style="width:'+pct+'%"><span class="hbar-num">'+locArr[k][1]+'</span></div></div></div>';}
h+='</div></div>';

// Year chart
var yrArr=Object.entries(yrCounts).sort(function(a,b){return a[0].localeCompare(b[0]);});
h+='<div class="dash-card"><div class="dash-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>선정년도별 기업수</div><div class="hbar-wrap">';
var maxYr=yrArr.length?Math.max.apply(null,yrArr.map(function(a){return a[1];})):1;
for(var k=0;k<yrArr.length;k++){var pct=Math.round(yrArr[k][1]/maxYr*100);h+='<div class="hbar-row"><span class="hbar-label">'+esc(yrArr[k][0])+'</span><div class="hbar-track"><div class="hbar-fill" style="width:'+pct+'%"><span class="hbar-num">'+yrArr[k][1]+'</span></div></div></div>';}
h+='</div></div>';
document.getElementById('dashGrid').innerHTML=h;}

// FAVORITES
function renderFavs(){var favs=getFavs();var list=document.getElementById('favList');var empty=document.getElementById('favEmpty');
if(!favs.length){list.innerHTML='';empty.style.display='';return;}
empty.style.display='none';var h='';
for(var i=0;i<favs.length;i++){var d=null;for(var j=0;j<DB.length;j++)if(DB[j].n===favs[i]){d=DB[j];break;}
if(!d)continue;
h+='<div class="fav-card" onclick="showCompanyByName(\''+esc(d.n).replace(/'/g,"\\'")+'\')">';
h+='<div class="fav-info"><div class="fav-name">'+esc(d.n)+'</div><div class="fav-meta">'+esc(d.prod)+' · '+esc(d.loc)+'</div></div>';
h+='<button class="fav-rm" onclick="event.stopPropagation();toggleFav(\''+esc(d.n).replace(/'/g,"\\'")+'\')" title="삭제"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>';}
list.innerHTML=h;}
</script>
