<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F4F6FA">
<title>GEAR-UP 위키</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/variable/pretendardvariable.min.css" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#F4F6FA;--surface:#FFF;--surface-2:#F0F3F8;--surface-3:#E6EAF2;--border:#D4DAE6;--border-light:#E8ECF4;--text:#1B2A4A;--text-dim:#4A5E80;--text-muted:#8494B2;--accent-1:#2B5EA7;--accent-1-light:#3A7BD5;--accent-1-dim:rgba(43,94,167,.08);--accent-1-bg:rgba(43,94,167,.05);--accent-2:#E8733A;--accent-3:#2E8B6E;--accent-4:#4A90C4;--danger:#D94452;--amber:#D4940B;--teal:#1A9B7A;--radius:16px;--radius-sm:10px;--shadow-sm:0 2px 8px rgba(27,42,74,.05);--shadow-md:0 8px 32px rgba(27,42,74,.08);--shadow-lg:0 16px 48px rgba(27,42,74,.12)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Pretendard Variable',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.loading-screen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.loading-screen.hidden{display:none}
.loading-spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent-1);border-radius:50%;animation:spin .7s linear infinite}
.loading-text{font-size:13px;color:var(--text-muted)}
@keyframes spin{to{transform:rotate(360deg)}}
.app{display:none}.app.show{display:block}
.container{max-width:960px;margin:0 auto;padding:20px 24px;position:relative}
.user-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.user-bar-left{display:flex;align-items:center;gap:10px}
.back-link{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border);color:var(--text-dim);font-size:12px;font-weight:600;text-decoration:none;transition:all .2s;box-shadow:var(--shadow-sm)}
.back-link:hover{border-color:var(--accent-1);color:var(--accent-1);background:var(--accent-1-dim)}
.back-link svg{width:14px;height:14px}
.user-info{font-size:12px;color:var(--text-muted)}.user-info strong{color:var(--text-dim);font-weight:600}
.logout-btn{padding:6px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text-muted);font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s}
.logout-btn:hover{background:#FEF2F2;color:var(--danger);border-color:rgba(217,68,82,.2)}
.header{text-align:center;padding:8px 12px 20px}
.header-badge{display:inline-flex;align-items:center;gap:8px;background:var(--accent-1-dim);border:1px solid rgba(43,94,167,.12);border-radius:100px;padding:5px 14px 5px 8px;margin-bottom:12px}
.header-badge-dot{width:7px;height:7px;border-radius:50%;background:var(--accent-3)}
.header-badge span{font-size:11px;color:var(--accent-1);font-weight:600}
h1{font-size:clamp(22px,5vw,30px);font-weight:800;color:var(--text);letter-spacing:-.5px;line-height:1.3}
h1 .accent{color:var(--accent-1)}
.subtitle{color:var(--text-muted);font-size:13px;margin-top:4px;font-weight:400}
.stats-row{display:flex;justify-content:center;gap:32px;margin-top:16px}
.stat-item{text-align:center}
.stat-num{font-size:26px;font-weight:800;color:var(--accent-1);letter-spacing:-.5px}
.stat-label{font-size:10px;color:var(--text-muted);margin-top:2px;font-weight:500}
.tab-bar{display:flex;gap:0;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:8px;box-shadow:var(--shadow-sm)}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex:0 0 auto;padding:12px 18px;border:none;background:transparent;color:var(--text-muted);font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.tab-btn.active{background:linear-gradient(135deg,#1B3A5C,#4A90C4);color:#fff;border-radius:12px;box-shadow:0 4px 12px rgba(27,58,92,.2)}
.tab-btn:hover:not(.active){color:var(--text-dim);background:var(--surface-2)}
.tab-btn svg{width:14px;height:14px}
.tab-content{display:none}.tab-content.active{display:block}
.search-section{position:sticky;top:0;z-index:200;padding:8px 0 12px;background:rgba(244,246,250,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.search-wrap{position:relative}
.search-box{position:relative;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .25s;box-shadow:var(--shadow-sm)}
.search-box:focus-within{border-color:var(--accent-1);box-shadow:0 0 0 3px var(--accent-1-dim),var(--shadow-md)}
.search-box input{width:100%;padding:14px 48px 14px 44px;background:transparent;border:none;color:var(--text);font-size:15px;font-family:inherit;outline:none}
.search-box input::placeholder{color:var(--text-muted);font-size:14px}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}
.search-icon svg{width:18px;height:18px}
.clr-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--surface-2);border:1px solid var(--border-light);color:var(--text-muted);width:28px;height:28px;border-radius:8px;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:15px}
.clr-btn.show{display:flex}
.ac-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(27,42,74,.15);z-index:199}.ac-overlay.show{display:block}
.autocomplete{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow-y:auto;box-shadow:var(--shadow-lg);display:none;z-index:201;max-height:min(360px,50vh)}.autocomplete.show{display:block}
.ac-item{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border-light);min-height:50px;transition:background .15s}
.ac-item:hover{background:var(--accent-1-dim)}.ac-item:last-child{border-bottom:none}
.ac-name{font-weight:600;font-size:14px;color:var(--text)}.ac-meta{font-size:11px;color:var(--text-muted);margin-top:1px}
.ac-badge{margin-left:auto;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;flex-shrink:0;background:var(--accent-1-dim);color:var(--accent-1)}
.ac-count{padding:10px 16px;font-size:12px;color:var(--text-muted);border-bottom:1px solid var(--border-light);position:sticky;top:0;background:var(--surface);z-index:1;font-weight:600}
.result{display:none;animation:fadeUp .4s ease}.result.show{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.company-hero{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:24px;margin:16px 0 12px;position:relative;overflow:hidden;box-shadow:var(--shadow-sm)}
.company-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(135deg,#1B3A5C,#4A90C4)}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.hero-name{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.hero-ceo{font-size:13px;color:var(--text-dim);margin-top:3px}
.hero-meta{font-size:12px;color:var(--text-muted);margin-top:6px;display:flex;flex-wrap:wrap;gap:8px}
.yr-badge{padding:4px 12px;border-radius:8px;font-size:11px;font-weight:700;background:var(--accent-1-dim);color:var(--accent-1)}
.fav-btn{padding:8px 16px;border-radius:8px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-dim);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s}
.fav-btn.active{background:rgba(212,148,11,.08);border-color:rgba(212,148,11,.25);color:var(--amber)}
.badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.badge{padding:3px 9px;border-radius:6px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;gap:4px}
.badge-inn{background:rgba(232,115,58,.1);color:var(--accent-2)}
.badge-ven{background:rgba(74,144,196,.1);color:var(--accent-4)}
.badge-wom{background:rgba(236,72,153,.1);color:#ec4899}
.badge-dis{background:rgba(168,85,247,.1);color:#a855f7}
.badge-soc{background:rgba(26,155,122,.1);color:var(--teal)}
.badge-gpass{background:rgba(46,139,110,.1);color:#2E8B6E}
.badge-member{background:rgba(43,94,167,.1);color:var(--accent-1)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
@media(max-width:500px){.info-grid{grid-template-columns:1fr}}
.info-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:16px;box-shadow:var(--shadow-sm)}
.info-card-title{font-size:10px;color:var(--accent-1);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;font-weight:700}
.info-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid var(--border-light);gap:8px}
.info-row:last-child{border-bottom:none}
.info-row .label{color:var(--text-muted);font-weight:500;flex-shrink:0}.info-row .value{color:var(--text);font-weight:600;text-align:right;word-break:break-all}
.results-section{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.result-item{padding:8px 12px;background:var(--surface-2);border-radius:8px;margin-bottom:6px;font-size:12px;color:var(--text-dim);line-height:1.5;border-left:3px solid var(--accent-3)}
.result-item:last-child{margin-bottom:0}
.result-year{font-size:10px;font-weight:700;color:var(--accent-3);margin-bottom:3px}
.consult-section{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);margin-bottom:12px;box-shadow:var(--shadow-sm);overflow:hidden}
.consult-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-light)}
.consult-header-left{display:flex;align-items:center;gap:8px}
.consult-title{font-size:10px;font-weight:700;color:var(--accent-1);text-transform:uppercase;letter-spacing:.8px}
.consult-count{font-size:11px;color:var(--text-muted);background:var(--surface-2);padding:2px 8px;border-radius:100px;font-weight:600}
.btn-add-consult{padding:6px 14px;background:linear-gradient(135deg,#1B3A5C,#4A90C4);border:none;border-radius:8px;color:#fff;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer}
.consult-list{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.consult-item{background:var(--surface-2);border-radius:10px;padding:12px 14px;position:relative;border:1px solid var(--border-light)}
.consult-item-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.consult-date{font-size:11px;font-weight:700;color:var(--accent-1);background:var(--accent-1-dim);padding:2px 8px;border-radius:6px}
.consult-type{font-size:10px;color:var(--text-muted);background:var(--surface);border:1px solid var(--border-light);padding:2px 7px;border-radius:5px;font-weight:600}
.consult-body{font-size:13px;color:var(--text);line-height:1.6}
.consult-staff{font-size:11px;color:var(--text-muted);margin-top:5px}
.consult-actions{position:absolute;top:10px;right:10px;display:flex;gap:4px;opacity:0;transition:opacity .15s}
.consult-item:hover .consult-actions{opacity:1}
.act-sm{padding:3px 8px;border:none;border-radius:5px;font-size:10px;font-weight:700;font-family:inherit;cursor:pointer}
.act-sm-edit{background:var(--accent-1-dim);color:var(--accent-1)}
.act-sm-del{background:rgba(217,68,82,.06);color:var(--danger)}
.no-consult{padding:24px;text-align:center;color:var(--text-muted);font-size:13px}
.contact-section{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
@media(max-width:500px){.contact-grid{grid-template-columns:1fr}}
.contact-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;color:var(--text-dim)}
.contact-item svg{width:14px;height:14px;color:var(--text-muted);flex-shrink:0}
.contact-item a{color:var(--accent-1);text-decoration:none;font-weight:600}
.fav-empty{text-align:center;padding:60px 20px;color:var(--text-muted)}
.fav-empty svg{width:48px;height:48px;margin-bottom:12px;opacity:.25}
.fav-list{display:flex;flex-direction:column;gap:8px}
.fav-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow-sm)}
.fav-card:hover{border-color:var(--accent-1);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.fav-card-info{flex:1;min-width:0}
.fav-card-name{font-weight:700;font-size:14px;color:var(--text)}
.fav-card-meta{font-size:11px;color:var(--text-muted);margin-top:2px}
.fav-yr{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;background:var(--accent-1-dim);color:var(--accent-1)}
.fav-remove{width:28px;height:28px;border:none;border-radius:6px;background:rgba(217,68,82,.06);color:var(--danger);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}
.db-toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.db-search{flex:1;min-width:160px;padding:10px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:inherit;outline:none}
.db-search:focus{border-color:var(--accent-1);box-shadow:0 0 0 3px var(--accent-1-dim)}.db-search::placeholder{color:var(--text-muted)}
.btn-primary{padding:10px 18px;background:linear-gradient(135deg,#1B3A5C,#4A90C4);border:none;border-radius:var(--radius-sm);color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s}
.btn-outline{padding:10px 18px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text-dim);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s}
.btn-outline:hover{border-color:var(--accent-1);color:var(--accent-1);background:var(--accent-1-dim)}
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1.5px solid var(--border);box-shadow:var(--shadow-sm);background:var(--surface)}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:700px}
thead{background:var(--surface-2)}
th{padding:12px 10px;text-align:left;font-weight:700;color:var(--text-dim);border-bottom:1.5px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:10px;border-bottom:1px solid var(--border-light);color:var(--text);white-space:nowrap}
tr:hover td{background:var(--accent-1-bg)}
.act-btn{padding:4px 10px;border:none;border-radius:6px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer}
.act-edit{background:var(--accent-1-dim);color:var(--accent-1)}
.act-del{background:rgba(217,68,82,.06);color:var(--danger)}
.db-pag{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:12px;flex-wrap:wrap}
.db-pag button{padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text-muted);font-size:12px;font-family:inherit;cursor:pointer;font-weight:600}
.db-pag button.active{background:linear-gradient(135deg,#1B3A5C,#4A90C4);color:#fff;border-color:transparent}.db-pag button:disabled{opacity:.3;cursor:not-allowed}
.db-page-info{font-size:11px;color:var(--text-muted);text-align:center;margin-top:6px;font-weight:500}
.filter-section{margin:12px 0;display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 14px;border-radius:100px;background:var(--surface);border:1.5px solid var(--border);color:var(--text-muted);font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s}
.chip.active{background:var(--accent-1-dim);border-color:rgba(43,94,167,.25);color:var(--accent-1)}
.chip:hover:not(.active){border-color:var(--accent-4);color:var(--text-dim)}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:10000;background:rgba(27,42,74,.3);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal-box{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;padding:28px;box-shadow:var(--shadow-lg)}
.modal-title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:20px;letter-spacing:-.3px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
@media(max-width:500px){.form-row{grid-template-columns:1fr}}
.form-group{display:flex;flex-direction:column}
.form-label{display:block;font-size:11px;color:var(--text-muted);margin-bottom:4px;font-weight:600}
.form-input{width:100%;padding:10px 12px;background:var(--surface-2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none}
.form-input:focus{border-color:var(--accent-1);box-shadow:0 0 0 3px var(--accent-1-dim)}
.form-textarea{resize:vertical;min-height:80px}
.form-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.btn-cancel{padding:10px 20px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text-dim);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}
.btn-save{padding:10px 24px;background:linear-gradient(135deg,#1B3A5C,#4A90C4);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
.form-section-title{font-size:12px;font-weight:700;color:var(--accent-1);margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border-light)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(80px);padding:12px 24px;border-radius:12px;color:#fff;font-size:14px;font-weight:700;font-family:inherit;z-index:99999;opacity:0;transition:all .3s}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:768px){.container{padding:16px}.tab-btn{padding:10px 14px;font-size:11px}.hero-name{font-size:17px}.stats-row{gap:20px}}
</style>
</head>
<body>
<div class="loading-screen" id="loadingScreen"><div class="loading-spinner"></div><div class="loading-text">인증 확인 중...</div></div>
<div class="app" id="app">
<div class="container">
  <div class="user-bar">
    <div class="user-bar-left">
      <a class="back-link" href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5m0 0l7 7m-7-7l7-7"/></svg>홈으로</a>
      <span class="user-info"><strong id="userEmail"></strong></span>
    </div>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>
  <div class="header">
    <div class="header-badge"><div class="header-badge-dot"></div><span>KODABIZ 21–25 | GEAR-UP</span></div>
    <h1>GEAR-UP <span class="accent">위키</span></h1>
    <div class="subtitle">중점지원기업 DB · 컨설팅 이력 · 수주성과 관리</div>
    <div class="stats-row">

function docId(s) { return String(s).replace(/[^\w가-힣\-]/g, '_').substring(0, 80); }

function subscribeData() {
  unsubDB = fdb.collection('kodabiz_companies').onSnapshot(function(snap) {
    if (!snap.empty) {
      DB = [];
      snap.forEach(function(d) { DB.push(Object.assign({_fid: d.id}, d.data())); });
      DB.sort(function(a, b) { return (a.n || '').localeCompare(b.n || ''); });
    } else if (DB.length === 0) {
      DB = LOCAL_DATA.map(function(d) { return Object.assign({}, d); });
    }
    refreshStats(); buildFilterChips(); renderDbTable();
    if (currentViewId) { var f = findCompany(currentViewId); if (f) showResult(f); }
  }, function() {
    if (DB.length === 0) DB = LOCAL_DATA.map(function(d) { return Object.assign({}, d); });
    refreshStats(); buildFilterChips(); renderDbTable();
  });

  unsubFavs = fdb.collection('kodabiz_users').doc(currentUser.uid).collection('favorites').onSnapshot(function(snap) {

function esc(s) { var d = document.createElement('div'); d.textContent = String(s || ''); return d.innerHTML; }

function parseConsults(raw) {
  if (!raw || !raw.trim()) return [];
  return raw.split('\n').map(function(l) { return l.trim(); }).filter(Boolean).map(function(l) {
    var m = l.match(/^\((\d{2,4}\.\d{2})\)\s*(.+)$/);
    if (m) return {date: m[1], body: m[2], type: '', staff: ''};
    return {date: '', body: l, type: '', staff: ''};
  });
}

function getConsults(c) {
  if (Array.isArray(c.consults) && c.consults.length > 0) return c.consults;
  return parseConsults(c.consult_raw || '');
}

function refreshStats() {
  document.getElementById('totalCnt').textContent = DB.length;

  document.getElementById('consultCnt').textContent = total;
}

    h += '</div><div class="consult-body">' + esc(c.body) + '</div>';

function openConsultModal(cid, idx) {
  var d = findCompany(cid); if (!d) return;

  var existing = isEdit ? (consults[idx] || {}) : {date: '', type: '', body: '', staff: ''};
  consultEditTarget = {cid: cid, idx: isEdit ? idx : null};
  document.getElementById('consultModalTitle').textContent = isEdit ? '상담내역 수정' : '상담내역 추가';
  var today = new Date();
  var mm = String(today.getFullYear()).slice(2) + '.' + String(today.getMonth() + 1).padStart(2, '0');
  var bod = esc(existing.body || '');
  document.getElementById('consultModalBody').innerHTML =
    '<div class="form-row">' +
    '<div class="form-group"><label class="form-label">날짜 (예: 25.04)</label>' +
    '<input class="form-input" id="c_date" value="' + esc(existing.date || mm) + '" placeholder="YY.MM"></div>' +
    '<div class="form-group"><label class="form-label">유형</label>' +

    '<textarea class="form-input form-textarea" id="c_body" placeholder="상담 내용을 입력하세요">' + bod + '</textarea></div>' +
    '<div class="form-group"><label class="form-label">담당자</label>' +
    '<input class="form-input" id="c_staff" value="' + esc(existing.staff || '') + '" placeholder="담당자 이름"></div>' +
    '<div class="form-actions"><button class="btn-cancel" onclick="closeConsultModal()">취소</button>' +
    '<button class="btn-save" onclick="saveConsult()">저장</button></div>';
  document.getElementById('consultModal').classList.add('show');
}

function closeConsultModal() { document.getElementById('consultModal').classList.remove('show'); }

function saveConsult() {
  var t = consultEditTarget; if (!t) return;
  var d = findCompany(t.cid); if (!d) return;
  var body = document.getElementById('c_body').value.trim();
  if (!body) { showToast('상담내용을 입력하세요', true); return; }
  var entry = {
    date: document.getElementById('c_date').value.trim(),
    type: document.getElementById('c_type').value.trim(),
    body: body,
    staff: document.getElementById('c_staff').value.trim()
  };
  var consults = getConsults(d).slice();
  if (t.idx !== null && t.idx !== undefined) consults[t.idx] = entry;
  else consults.push(entry);
  consults.sort(function(a, b) { return (a.date || '').localeCompare(b.date || ''); });
  d.consults = consults;
  d.consult_raw = '';
  saveCompany(d).then(function() {
    closeConsultModal(); updateConsultUI(t.cid);
    showToast(t.idx !== null ? '수정 완료' : '추가 완료');
  }).catch(function() {
    closeConsultModal(); updateConsultUI(t.cid);
    showToast(t.idx !== null ? '수정 완료 (로컬)' : '추가 완료 (로컬)');
  });
}

function deleteConsult(cid, idx) {
  if (!confirm('이 상담내역을 삭제하시겠습니까?')) return;
  var d = findCompany(cid); if (!d) return;
  var consults = getConsults(d).slice();
  consults.splice(idx, 1);
  d.consults = consults; d.consult_raw = '';
  saveCompany(d).then(function() { updateConsultUI(cid); showToast('삭제 완료'); })
    .catch(function() { updateConsultUI(cid); showToast('삭제 완료 (로컬)'); });
}

function renderDbTable() {
  var q = (document.getElementById('dbSearch').value || '').trim().toLowerCase();
  var yr = document.getElementById('dbYrFilter').value;
  var list = DB.filter(function(d) {
    var mq = !q || d.n.toLowerCase().indexOf(q) !== -1 || (d.cat && d.cat.toLowerCase().indexOf(q) !== -1);
    var my = !yr || (d.yr && d.yr.indexOf(yr) !== -1);
    return mq && my;
  });
  var tp = Math.max(1, Math.ceil(list.length / dbPP));
  if (dbPage >= tp) dbPage = tp - 1;
  var st = dbPage * dbPP, pg = list.slice(st, st + dbPP);
  var h = '';
  pg.forEach(function(d, i) {
    var cn = getConsults(d).length;
    var did = esc(d.id || d.n);
    h += '<tr><td>' + (st + i + 1) + '</td>';
    h += '<td style="font-weight:600">' + esc(d.n) + '</td>';
    h += '<td>' + esc(d.ceo || '') + '</td>';
    h += '<td>' + esc(d.cat || '') + '</td>';
    h += '<td>' + esc(d.loc || '') + '</td>';
    h += '<td>' + esc(d.yr || '') + '</td>';
    h += '<td><span style="background:var(--accent-1-dim);color:var(--accent-1);padding:2px 8px;border-radius:6px;font-weight:700">' + cn + '</span></td>';
    h += '<td style="display:flex;gap:4px">';
    h += '<button class="act-btn act-edit" data-id="' + did + '" onclick="openEditModal(this.dataset.id)">수정</button>';
    h += '<button class="act-btn act-del" data-id="' + did + '" onclick="deleteRecord(this.dataset.id)">삭제</button>';
    h += '</td></tr>';
  });
  document.getElementById('dbBody').innerHTML = h || '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-muted)">데이터 없음</td></tr>';
  document.getElementById('dbPageInfo').textContent = '전체 ' + list.length + '개 중 ' + (st + 1) + '–' + Math.min(st + dbPP, list.length);
  var ph = '<button ' + (dbPage === 0 ? 'disabled' : '') + ' onclick="dbPage=0;renderDbTable()">&#171;</button>';
  ph += '<button ' + (dbPage === 0 ? 'disabled' : '') + ' onclick="dbPage--;renderDbTable()">&#8249;</button>';
  var ps = Math.max(0, dbPage - 2), pe = Math.min(tp - 1, dbPage + 2);
  for (var p = ps; p <= pe; p++) ph += '<button class="' + (p === dbPage ? 'active' : '') + '" onclick="dbPage=' + p + ';renderDbTable()">' + (p + 1) + '</button>';
  ph += '<button ' + (dbPage >= tp - 1 ? 'disabled' : '') + ' onclick="dbPage++;renderDbTable()">&#8250;</button>';
  ph += '<button ' + (dbPage >= tp - 1 ? 'disabled' : '') + ' onclick="dbPage=' + (tp - 1) + ';renderDbTable()">&#187;</button>';
  document.getElementById('dbPag').innerHTML = ph;
}

function buildForm(data) {
  var h = '<div class="form-section-title">기본 정보</div>';
  for (var i = 0; i < FIELDS.length; i += 2) {
    h += '<div class="form-row">';
    for (var j = i; j < Math.min(i + 2, FIELDS.length); j++) {
      var f = FIELDS[j], v = data ? (data[f.k] != null ? data[f.k] : '') : '';
      h += '<div class="form-group"><label class="form-label">' + f.l + (f.req ? ' *' : '') + '</label>';
      h += '<input class="form-input" id="f_' + f.k + '" value="' + esc(String(v)) + '" placeholder="' + f.l + '"></div>';
    }
    h += '</div>';
  }
  h += '<div class="form-section-title">기업 특성</div><div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:12px">';
  CHECKS.forEach(function(f) {
    var v = data ? data[f.k] : '';
    h += '<label style="display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text-dim);cursor:pointer">';
    h += '<input type="checkbox" id="f_' + f.k + '" ' + (v ? 'checked' : '') + ' style="width:14px;height:14px"> ' + f.l + '</label>';
  });
  h += '</div><div class="form-section-title">수주성과</div>';
  for (var i = 0; i < RESULT_FIELDS.length; i += 2) {
    h += '<div class="form-row">';
    for (var j = i; j < Math.min(i + 2, RESULT_FIELDS.length); j++) {
      var f = RESULT_FIELDS[j], v = data ? (data[f.k] != null ? data[f.k] : '') : '';
      h += '<div class="form-group"><label class="form-label">' + f.l + '</label>';
      h += '<input class="form-input" id="f_' + f.k + '" value="' + esc(String(v)) + '" placeholder="수주 내역"></div>';
    }
    h += '</div>';
  }
  h += '<div class="form-actions"><button class="btn-cancel" onclick="closeModal()">취소</button><button class="btn-save" onclick="saveForm()">저장</button></div>';
  return h;
}

function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '신규 기업 등록';
  document.getElementById('modalBody').innerHTML = buildForm(null);
  document.getElementById('modal').classList.add('show');
}
function openEditModal(id) {
  var d = findCompany(id); if (!d) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '기업 정보 수정';
  document.getElementById('modalBody').innerHTML = buildForm(d);
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }

document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.getElementById('consultModal').addEventListener('click', function(e) { if (e.target === this) closeConsultModal(); });

function saveForm() {
  var n = document.getElementById('f_n').value.trim();
  if (!n) { showToast('기업명은 필수입니다', true); return; }
  var rec = {n: n, id: docId(n)};
  FIELDS.forEach(function(f) { if (f.k !== 'n') rec[f.k] = document.getElementById('f_' + f.k).value.trim(); });
  CHECKS.forEach(function(f) { rec[f.k] = document.getElementById('f_' + f.k).checked ? 'O' : ''; });
  RESULT_FIELDS.forEach(function(f) { rec[f.k] = document.getElementById('f_' + f.k).value.trim(); });
  if (editingId) {
    var old = findCompany(editingId);
    if (old) { rec.consults = old.consults || []; rec.consult_raw = old.consult_raw || ''; }
  }
  saveCompany(rec).then(function() {
    closeModal(); showToast(editingId ? '수정 완료' : '등록 완료');
  }).catch(function(e) { showToast('저장 실패: ' + e.message, true); });
}

function deleteRecord(id) {
  if (!confirm('정말 삭제하시겠습니까?')) return;
  deleteCompany(id).then(function() { showToast('삭제 완료'); }).catch(function() { showToast('삭제 실패', true); });
}

function exportCsv() {
  if (!DB.length) { showToast('내보낼 데이터 없음', true); return; }
  var keys = ['n','ceo','cat','prod','loc','yr','country','inn','ven','wom','dis','soc','gpass','member','exec','un','otherbiz','tech','vendor','r21','r22','r23','r24','r25','r26','off','fax','mgr','ph','em','hp','adr'];
  var csv = keys.join(',') + '\n';
  DB.forEach(function(d) {
    csv += keys.map(function(k) {
      var v = d[k] != null ? String(d[k]) : '';
      return (v.indexOf(',') !== -1 || v.indexOf('"') !== -1) ? '"' + v.replace(/"/g, '""') + '"' : v;
    }).join(',') + '\n';
  });
  var blob = new Blob(['\uFEFF' + csv], {type: 'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href = url;
  a.download = 'kodabiz_' + new Date().toISOString().slice(0, 10) + '.csv'; a.click();
  URL.revokeObjectURL(url); showToast('CSV 내보내기 완료');
}

document.getElementById('tabBar').addEventListener('click', function(e) {
  var btn = e.target.closest('.tab-btn'); if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  if (btn.dataset.tab === 'db') renderDbTable();
  if (btn.dataset.tab === 'favs') renderFavs();
});

</script>
